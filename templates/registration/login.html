<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'account/css.css' %}">
</head>
<body>
  <div id="container" class="container">
		<!-- FORM SECTION -->
		<div class="row">
		<div class="col align-items-center flex-col sign-in">
				<div class="form-wrapper align-items-center" style='margin: 0px 50px -150px 1300px;'>
					<div class="form sign-in">
						<div class="input-group">
							 <form method='POST'>
								
                               {% csrf_token %}
                               {{form.as_p}}
							
						<button>
							Sign in
						</button></form>
					
							<span>
								 Don't have an account? <a href="{% url 'accounts:signup' %}" style='text-decoration: none;color: #E1306C;'>sign up</a>.
							</span>
							<b onclick="toggle()" class="pointer">
								
							</b>
						</p>
					</div>
				</div>
				<div class="form-wrapper">
		
				</div>
			</div>
			<!-- END SIGN IN -->
		</div>
		<!-- END FORM SECTION -->
		<!-- CONTENT SECTION -->
		<div class="row content-row">
			<!-- SIGN IN CONTENT -->
			<div class="col align-items-center flex-col">
				<div class="text sign-in">
					<h2>
						Welcome
					</h2>
	
				</div>
				<div class="img sign-in">
		
				</div>
			</div>

      <script src="{% static 'account/js.js' %}"></script>
</body>
</html>
